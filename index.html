<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family World Cup 2026 — Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;900&family=Archivo:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./assets/styles.css" />
  <script src="./assets/config.js"></script>
</head>
<body>
  <div class="pitch-glow" aria-hidden="true"></div>

  <!-- ========================= AUTH ========================= -->
  <main id="auth-view" class="auth hidden">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-kicker">2026 · USA · CANADA · MEXICO</span>
        <h1 class="brand-title">FAMILY<br /><em>WORLD&nbsp;CUP</em></h1>
        <p class="brand-sub">7 predictions. One champion. Bragging rights all summer.</p>
      </div>

      <div class="seg">
        <button class="seg-btn active" data-mode="login">Log in</button>
        <button class="seg-btn" data-mode="signup">Sign up</button>
      </div>

      <div class="field" id="name-field" style="display:none">
        <label>Your name</label>
        <input id="display-name" type="text" autocomplete="name" placeholder="e.g. Omar" />
      </div>
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>

      <button id="auth-submit" class="btn-primary">Log in</button>
      <p id="auth-msg" class="msg"></p>
    </div>
  </main>

  <!-- ========================= APP ========================= -->
  <div id="app-view" class="app hidden">
    <header class="topbar">
      <div class="topbar-brand">
        <span class="dot"></span>
        <span>Family World Cup <strong>’26</strong></span>
      </div>
      <div class="topbar-right">
        <span id="who" class="who"></span>
        <button id="logout" class="btn-ghost">Log out</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="groups">Group Stage</button>
      <button class="tab" data-tab="knockouts">Knockouts</button>
      <button class="tab" data-tab="bonus">Bonus Picks</button>
      <button class="tab" data-tab="info">Groups &amp; Schedule</button>
      <button class="tab" data-tab="board">Leaderboard</button>
    </nav>

    <section id="tab-groups" class="panel"></section>
    <section id="tab-knockouts" class="panel hidden"></section>
    <section id="tab-bonus" class="panel hidden"></section>
    <section id="tab-info" class="panel hidden"></section>
    <section id="tab-board" class="panel hidden"></section>

    <footer class="foot">
      Scoring: <b>2</b> pts exact score · <b>1</b> pt correct result ·
      Bonus: champion <b>5</b>, finalist <b>3</b>, semifinalist <b>2</b>.
      Picks lock at kickoff.
    </footer>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./assets/app.js"></script>
</body>
</html>
