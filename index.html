<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كأس العالم العائلية 2026 — التوقعات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./assets/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="./assets/config.js"></script>
</head>
<body>
  <div class="pitch-glow" aria-hidden="true"></div>

  <!-- ========================= AUTH ========================= -->
  <main id="auth-view" class="auth hidden">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-kicker">2026 · أمريكا · كندا · المكسيك</span>
        <h1 class="brand-title">كأس العالم<br /><em>العائلية</em></h1>
        <p class="brand-sub">توقّعات للعائلة. بطلٌ واحد. وافتخارٌ طوال الصيف.</p>
      </div>

      <div class="seg">
        <button class="seg-btn active" data-mode="login">تسجيل الدخول</button>
        <button class="seg-btn" data-mode="signup">حساب جديد</button>
      </div>

      <div class="field" id="name-field" style="display:none">
        <label>اسمك</label>
        <input id="display-name" type="text" autocomplete="name" placeholder="مثال: عمر" />
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>

      <button id="auth-submit" class="btn-primary">تسجيل الدخول</button>
      <p id="auth-msg" class="msg"></p>
    </div>
  </main>

  <!-- ========================= APP ========================= -->
  <div id="app-view" class="app hidden">
    <header class="topbar">
      <div class="topbar-brand">
        <span class="dot"></span>
        <span>كأس العالم العائلية <strong>٢٦</strong></span>
      </div>
      <div class="topbar-right">
        <span id="who" class="who"></span>
        <button id="logout" class="btn-ghost">خروج</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="groups">دور المجموعات</button>
      <button class="tab" data-tab="knockouts">الأدوار الإقصائية</button>
      <button class="tab" data-tab="picks">ترتيب المجموعات</button>
      <button class="tab" data-tab="bonus">توقعات إضافية</button>
      <button class="tab" data-tab="info">المجموعات والجدول</button>
      <button class="tab" data-tab="board">الترتيب العام</button>
    </nav>

    <section id="tab-groups" class="panel"></section>
    <section id="tab-knockouts" class="panel hidden"></section>
    <section id="tab-picks" class="panel hidden"></section>
    <section id="tab-bonus" class="panel hidden"></section>
    <section id="tab-info" class="panel hidden"></section>
    <section id="tab-board" class="panel hidden"></section>

    <footer class="foot">
      النقاط: <b>٢</b> للنتيجة الصحيحة بالضبط · <b>١</b> لتوقّع الفائز ·
      الإضافية: البطل <b>٥</b>، صاحب النهائي <b>٣</b>، صاحب نصف النهائي <b>٢</b>.
      تُقفل التوقعات عند انطلاق المباراة.
    </footer>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./assets/app.js"></script>
</body>
</html>
